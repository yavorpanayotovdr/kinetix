name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:

  changes:
    runs-on: ubuntu-latest
    outputs:
      kotlin: ${{ steps.filter.outputs.kotlin }}
      python: ${{ steps.filter.outputs.python }}
      ui: ${{ steps.filter.outputs.ui }}
      infra: ${{ steps.filter.outputs.infra }}
      proto: ${{ steps.filter.outputs.proto }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            proto:
              - 'proto/src/main/proto/**'
              - 'proto/buf.yaml'
            kotlin:
              - '*.gradle.kts'
              - 'gradle/**'
              - 'build-logic/**'
              - 'proto/**'
              - 'common/**'
              - 'gateway/**'
              - 'position-service/**'
              - 'price-service/**'
              - 'risk-orchestrator/**'
              - 'regulatory-service/**'
              - 'notification-service/**'
              - 'audit-service/**'
              - 'correlation-service/**'
              - 'rates-service/**'
              - 'reference-data-service/**'
              - 'volatility-service/**'
              - 'end2end-tests/**'
            python:
              - 'risk-engine/**'
            ui:
              - 'ui/**'
            infra:
              - 'infra/**'

  proto-lint:
    needs: changes
    if: needs.changes.outputs.proto == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Lint proto files
        working-directory: proto
        run: buf lint
      - name: Check proto breaking changes against main
        working-directory: proto
        run: buf breaking --against '../.git#branch=main,subdir=proto'

  kotlin-compile:
    needs: [changes, proto-lint]
    if: |
      always() &&
      (needs.proto-lint.result == 'success' || needs.proto-lint.result == 'skipped') &&
      (needs.changes.outputs.kotlin == 'true' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Compile all modules
        run: ./gradlew classes testClasses -x test -x acceptanceTest -x integrationTest -x end2EndTest

  kotlin-unit-tests:
    needs: kotlin-compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - common
          - gateway
          - notification-service
          - position-service
          - price-service
          - rates-service
          - risk-orchestrator
          - regulatory-service
          - audit-service
          - reference-data-service
          - volatility-service
          - correlation-service
          - schema-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Unit tests (${{ matrix.module }})
        run: ./gradlew :${{ matrix.module }}:test
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-${{ matrix.module }}
          path: '${{ matrix.module }}/build/reports/tests/test/'
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-xml-${{ matrix.module }}
          path: '${{ matrix.module }}/build/test-results/test/**/*.xml'
          retention-days: 1

  kotlin-acceptance-tests:
    needs: kotlin-compile
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - gateway
          - notification-service
          - risk-orchestrator
          - regulatory-service
          - position-service
          - audit-service
          - price-service
          - rates-service
          - reference-data-service
          - volatility-service
          - correlation-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Acceptance tests (${{ matrix.module }})
        run: ./gradlew :${{ matrix.module }}:acceptanceTest
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-reports-${{ matrix.module }}
          path: '${{ matrix.module }}/build/reports/tests/acceptanceTest/'
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: acceptance-test-xml-${{ matrix.module }}
          path: '${{ matrix.module }}/build/test-results/acceptanceTest/**/*.xml'
          retention-days: 1

  kotlin-integration:
    needs: [kotlin-unit-tests, kotlin-acceptance-tests]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - position-service
          - price-service
          - risk-orchestrator
          - audit-service
          - correlation-service
          - rates-service
          - reference-data-service
          - volatility-service
          - regulatory-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: Build risk-engine Docker image
        if: matrix.module == 'risk-orchestrator'
        run: docker build -t kinetix-risk-engine-test -f deploy/docker/Dockerfile.risk-engine .
      - name: Integration tests (${{ matrix.module }})
        run: ./gradlew :${{ matrix.module }}:integrationTest
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports-${{ matrix.module }}
          path: '${{ matrix.module }}/build/reports/tests/integrationTest/'
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-xml-${{ matrix.module }}
          path: '${{ matrix.module }}/build/test-results/integrationTest/**/*.xml'
          retention-days: 1

  end-to-end-tests:
    needs: kotlin-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - name: End-to-end tests
        run: ./gradlew :end2end-tests:end2EndTest
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-reports
          path: 'end2end-tests/build/reports/tests/end2EndTest/'
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-xml
          path: 'end2end-tests/build/test-results/end2EndTest/**/*.xml'
          retention-days: 1

  python-unit-tests:
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: risk-engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Unit tests
        run: uv run pytest -m "not integration and not performance" --tb=short --junitxml=reports/unit.xml
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-unit-test-reports
          path: risk-engine/reports/
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-unit-test-xml
          path: risk-engine/reports/unit.xml
          retention-days: 1

  python-integration-tests:
    needs: python-unit-tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: risk-engine
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv sync
      - name: Integration tests
        run: uv run pytest -m integration --tb=short --junitxml=reports/integration.xml
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-integration-test-reports
          path: risk-engine/reports/
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-integration-test-xml
          path: risk-engine/reports/integration.xml
          retention-days: 1

  ui-build:
    needs: changes
    if: needs.changes.outputs.ui == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-reports
          path: ui/coverage/
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-test-xml
          path: ui/test-results/junit.xml
          retention-days: 1

  ui-e2e-tests:
    needs: ui-build
    if: needs.ui-build.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    strategy:
      fail-fast: false
      matrix:
        spec:
          - alert-rules
          - column-visibility
          - csv-export
          - dark-mode
          - empty-state-and-summary-cards
          - eod-promotion
          - eod-timeline
          - instrument-type-display
          - keyboard-navigation
          - pagination
          - phase-stepper
          - pnl-color-coding
          - portfolio-summary-card
          - position-data-rendering
          - risk-metrics
          - risk-sorting
          - risk-tab
          - run-comparison
          - run-reproducibility
          - scenarios-tab
          - sod-badge
          - trade-blotter
          - websocket-reconnect
          - what-if-panel
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Playwright (${{ matrix.spec }})
        run: npx playwright test e2e/${{ matrix.spec }}.spec.ts
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-reports-${{ matrix.spec }}
          path: ui/playwright-report/
          retention-days: 14
      - name: Upload test XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-e2e-xml-${{ matrix.spec }}
          path: ui/test-results/e2e/junit.xml
          retention-days: 1

  validate-alerts:
    needs: changes
    if: needs.changes.outputs.infra == 'true' || github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install promtool
        run: |
          PROM_VERSION=2.53.0
          case "$(uname -m)" in
            x86_64)  ARCH=amd64 ;;
            aarch64) ARCH=arm64 ;;
            *)       echo "Unsupported architecture: $(uname -m)" && exit 1 ;;
          esac
          curl -sL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/prometheus-${PROM_VERSION}.linux-${ARCH}.tar.gz" | tar xz
          sudo mv "prometheus-${PROM_VERSION}.linux-${ARCH}/promtool" /usr/local/bin/
      - name: Validate alert rules syntax
        run: promtool check rules infra/prometheus/alert-rules.yml
      - name: Run alert rule tests
        working-directory: infra/prometheus
        run: promtool test rules alert-rules-test.yml

  test-summary:
    needs: [kotlin-unit-tests, kotlin-acceptance-tests, kotlin-integration, end-to-end-tests, python-unit-tests, python-integration-tests, ui-build, ui-e2e-tests]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: scripts
      - uses: actions/download-artifact@v4
        with:
          pattern: '*-test-xml*'
          path: test-results/
      - name: Test summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SUMMARY=$(python3 scripts/test-summary.py test-results/ --format markdown)
          echo "$SUMMARY"
          echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"
          CONCLUSION=success
          if echo "$SUMMARY" | grep -q '✗'; then CONCLUSION=failure; fi
          gh api repos/${{ github.repository }}/check-runs \
            --method POST \
            -f name="Test Results" \
            -f head_sha=${{ github.sha }} \
            -f status=completed \
            -f conclusion="$CONCLUSION" \
            -f "output[title]=Test Summary" \
            -f "output[summary]=$SUMMARY"
