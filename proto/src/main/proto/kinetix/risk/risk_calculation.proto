syntax = "proto3";

package kinetix.risk;

option java_package = "com.kinetix.proto.risk";
option java_multiple_files = true;

import "kinetix/common/types.proto";
import "google/protobuf/timestamp.proto";

enum RiskCalculationType {
  RISK_CALCULATION_TYPE_UNSPECIFIED = 0;
  HISTORICAL = 1;
  PARAMETRIC = 2;
  MONTE_CARLO = 3;
}

enum ConfidenceLevel {
  CONFIDENCE_LEVEL_UNSPECIFIED = 0;
  CL_95 = 1;
  CL_99 = 2;
  CL_975 = 3;
}

enum MarketDataType {
  MARKET_DATA_TYPE_UNSPECIFIED = 0;
  SPOT_PRICE = 1;
  HISTORICAL_PRICES = 2;
  VOLATILITY_SURFACE = 3;
  YIELD_CURVE = 4;
  RISK_FREE_RATE = 5;
  DIVIDEND_YIELD = 6;
  CREDIT_SPREAD = 7;
  FORWARD_CURVE = 8;
  CORRELATION_MATRIX = 9;
}

message TimeSeriesPoint {
  google.protobuf.Timestamp timestamp = 1;
  double value = 2;
}

message TimeSeries {
  repeated TimeSeriesPoint points = 1;
}

message Matrix {
  int32 rows = 1;
  int32 cols = 2;
  repeated double values = 3;   // row-major
  repeated string labels = 4;
}

message CurvePoint {
  string tenor = 1;
  double value = 2;
}

message Curve {
  repeated CurvePoint points = 1;
}

message MarketDataValue {
  MarketDataType data_type = 1;
  string instrument_id = 2;
  string asset_class = 3;
  oneof value {
    double scalar = 4;           // SPOT_PRICE, RISK_FREE_RATE, DIVIDEND_YIELD, CREDIT_SPREAD
    TimeSeries time_series = 5;  // HISTORICAL_PRICES
    Matrix matrix = 6;           // CORRELATION_MATRIX, VOLATILITY_SURFACE
    Curve curve = 7;             // YIELD_CURVE, FORWARD_CURVE
  }
}

message VaRRequest {
  kinetix.common.BookId book_id = 1;
  RiskCalculationType calculation_type = 2;
  ConfidenceLevel confidence_level = 3;
  int32 time_horizon_days = 4;
  int32 num_simulations = 5; // For Monte Carlo
  repeated kinetix.common.Position positions = 6;
  repeated MarketDataValue market_data = 7;
}

message VaRResponse {
  kinetix.common.BookId book_id = 1;
  RiskCalculationType calculation_type = 2;
  ConfidenceLevel confidence_level = 3;
  double var_value = 4;
  double expected_shortfall = 5;
  repeated VaRComponentBreakdown component_breakdown = 6;
  google.protobuf.Timestamp calculated_at = 7;
}

message VaRComponentBreakdown {
  kinetix.common.AssetClass asset_class = 1;
  double var_contribution = 2;
  double percentage_of_total = 3;
}

enum ValuationOutput {
  VALUATION_OUTPUT_UNSPECIFIED = 0;
  VAR = 1;
  EXPECTED_SHORTFALL = 2;
  GREEKS = 3;
  PV = 4;
}

message ValuationRequest {
  kinetix.common.BookId book_id = 1;
  RiskCalculationType calculation_type = 2;
  ConfidenceLevel confidence_level = 3;
  int32 time_horizon_days = 4;
  int32 num_simulations = 5;
  repeated kinetix.common.Position positions = 6;
  repeated MarketDataValue market_data = 7;
  repeated ValuationOutput requested_outputs = 8;
  int64 monte_carlo_seed = 9;             // 0 = unseeded (non-deterministic); >0 = deterministic
}

message GreeksSummary {
  repeated GreekValues asset_class_greeks = 1;
  double theta = 2;
  double rho = 3;
}

message GreekValues {
  kinetix.common.AssetClass asset_class = 1;
  double delta = 2;
  double gamma = 3;
  double vega = 4;
}

message ValuationResponse {
  kinetix.common.BookId book_id = 1;
  RiskCalculationType calculation_type = 2;
  ConfidenceLevel confidence_level = 3;
  double var_value = 4;
  double expected_shortfall = 5;
  repeated VaRComponentBreakdown component_breakdown = 6;
  google.protobuf.Timestamp calculated_at = 7;
  GreeksSummary greeks = 8;
  repeated ValuationOutput computed_outputs = 9;
  double pv_value = 10;
  string model_version = 11;              // risk-engine version, e.g. "0.1.0-abc1234"
  int64 monte_carlo_seed = 12;            // seed used (0 = not applicable / unseeded)
}

// Cross-book aggregated VaR: computes portfolio-level VaR across multiple books
// with proper correlation/diversification effects and per-book Euler decomposition.
message CrossBookVaRRequest {
  repeated kinetix.common.BookId book_ids = 1;
  RiskCalculationType calculation_type = 2;
  ConfidenceLevel confidence_level = 3;
  int32 time_horizon_days = 4;
  int32 num_simulations = 5;
  repeated kinetix.common.Position positions = 6;
  repeated MarketDataValue market_data = 7;
  repeated ValuationOutput requested_outputs = 8;
  int64 monte_carlo_seed = 9;
  string portfolio_group_id = 10;
}

message BookVaRContribution {
  kinetix.common.BookId book_id = 1;
  double var_contribution = 2;
  double percentage_of_total = 3;
  double standalone_var = 4;
  double diversification_benefit = 5;
  double marginal_var = 6;  // VaR per unit of book exposure (dVaR/dw_i)
  double incremental_var = 7;  // Change in portfolio VaR when this book is removed
}

message CrossBookVaRResponse {
  string portfolio_group_id = 1;
  repeated kinetix.common.BookId book_ids = 2;
  RiskCalculationType calculation_type = 3;
  ConfidenceLevel confidence_level = 4;
  double var_value = 5;
  double expected_shortfall = 6;
  repeated VaRComponentBreakdown component_breakdown = 7;
  repeated BookVaRContribution book_contributions = 8;
  double total_standalone_var = 9;
  double diversification_benefit = 10;
  google.protobuf.Timestamp calculated_at = 11;
  string model_version = 12;
  int64 monte_carlo_seed = 13;
}

// -----------------------------------------------------------------------
// Factor-based risk decomposition
// -----------------------------------------------------------------------

enum FactorType {
  FACTOR_TYPE_UNSPECIFIED = 0;
  FACTOR_EQUITY_BETA = 1;
  FACTOR_RATES_DURATION = 2;
  FACTOR_CREDIT_SPREAD = 3;
  FACTOR_FX_DELTA = 4;
  FACTOR_VOL_EXPOSURE = 5;
}

enum LoadingMethod {
  LOADING_METHOD_UNSPECIFIED = 0;
  LOADING_OLS_REGRESSION = 1;
  LOADING_ANALYTICAL = 2;
  LOADING_MANUAL = 3;
}

message PositionLoadingInput {
  string instrument_id = 1;
  string asset_class = 2;
  double market_value = 3;
  // Optional pre-computed instrument returns (row-major, chronological).
  // When provided and length >= 63, OLS regression is used.
  repeated double instrument_returns = 4;
}

message FactorReturnSeries {
  FactorType factor = 1;
  repeated double returns = 2;  // chronological daily returns
}

message FactorDecompositionRequest {
  string book_id = 1;
  repeated PositionLoadingInput positions = 2;
  repeated FactorReturnSeries factor_returns = 3;
  double total_var = 4;
  string decomposition_date = 5;
  string job_id = 6;
}

message FactorContribution {
  FactorType factor = 1;
  double factor_exposure = 2;
  double factor_var = 3;
  double pnl_attribution = 4;
  double pct_of_total_var = 5;
}

message InstrumentLoadingResult {
  string instrument_id = 1;
  FactorType factor = 2;
  double loading = 3;
  double r_squared = 4;
  bool has_r_squared = 5;
  LoadingMethod method = 6;
}

message FactorDecompositionResponse {
  string book_id = 1;
  string decomposition_date = 2;
  double total_var = 3;
  double systematic_var = 4;
  double idiosyncratic_var = 5;
  double r_squared = 6;
  repeated FactorContribution factor_contributions = 7;
  repeated InstrumentLoadingResult loadings = 8;
  string job_id = 9;
}

service RiskCalculationService {
  // Deprecated: use Valuate instead
  rpc CalculateVaR(VaRRequest) returns (VaRResponse);
  rpc CalculateVaRStream(stream VaRRequest) returns (stream VaRResponse);
  rpc Valuate(ValuationRequest) returns (ValuationResponse);
  rpc CalculateCrossBookVaR(CrossBookVaRRequest) returns (CrossBookVaRResponse);
  rpc DecomposeFactorRisk(FactorDecompositionRequest) returns (FactorDecompositionResponse);
}
