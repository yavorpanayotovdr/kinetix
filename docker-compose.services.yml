        SERVICE_NAME: price-service
    environment:
      SERVICE_NAME: price-service
      DATABASE_URL: jdbc:postgresql://postgres:5432/kinetix_price
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_URL: redis://redis:6379
      SEED_DATA: "true"
      FEED_ENABLED: "true"
      OTEL_JAVA_GLOBAL_AUTOCONFIGURE_ENABLED: "true"
      OTEL_SERVICE_NAME: price-service
