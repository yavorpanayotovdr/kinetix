      regulatory-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks: [kinetix]

  ui:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.ui
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    networks: [kinetix]

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ../deploy/docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    depends_on:
      ui:
        condition: service_healthy
    networks: [kinetix]

volumes:
  caddy_data:
  caddy_config:

networks:
  kinetix:
    external: true
