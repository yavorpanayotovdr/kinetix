<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Stylised "K" formed by a vertical bar and a pulse/zigzag stroke -->
  <!-- Vertical bar of K -->
  <rect x="7" y="7" width="3.5" height="18" rx="1.5" fill="white"/>
  <!-- Upper arm: pulse zigzag going up-right -->
  <polyline
    points="10.5,16 14,16 16,10 18.5,14 21,7.5 24,7.5"
    fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lower arm: pulse zigzag going down-right -->
  <polyline
    points="10.5,16 14,16 16,22 18.5,18 21,24.5 24,24.5"
    fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
