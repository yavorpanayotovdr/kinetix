groups:
  - name: kinetix-risk
    rules:
      - alert: VaRBreached
        expr: risk_var_value > 1000000
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "VaR breached threshold for portfolio {{ $labels.book_id }}"
          description: "VaR value {{ $value }} exceeds 1,000,000 for portfolio {{ $labels.book_id }}"

      - alert: RiskCalculationSlow
        expr: histogram_quantile(0.95, rate(var_calculation_duration_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Risk calculation p95 latency exceeds 30s"
          description: "P95 VaR calculation duration is {{ $value }}s"

  - name: kinetix-price
    rules:
      - alert: MarketDataStale
        expr: price_staleness_seconds > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Market data is stale for {{ $labels.instrument_id }}"
          description: "Market data staleness is {{ $value }}s for {{ $labels.instrument_id }}"

  - name: kinetix-kafka
    rules:
      - alert: KafkaConsumerLag
        expr: kafka_consumergroup_lag > 10000
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high for {{ $labels.consumergroup }}"
          description: "Consumer group {{ $labels.consumergroup }} has lag of {{ $value }} on topic {{ $labels.topic }}"

      - alert: DLQMessagesPresent
        expr: sum by (topic) (kafka_topic_partition_current_offset{topic=~".*\\.dlq"}) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "DLQ has messages on {{ $labels.topic }}"
          description: "Dead letter queue {{ $labels.topic }} has accumulated messages"

  - name: kinetix-services
    rules:
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "{{ $labels.job }} has been unreachable for more than 1 minute"

      - alert: HighErrorRate
        expr: sum by (job) (rate(ktor_http_server_requests_seconds_count{status=~"5.."}[5m])) / sum by (job) (rate(ktor_http_server_requests_seconds_count[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has a 5xx error rate of {{ $value | humanizePercentage }}"

      - alert: HighLatency
        expr: histogram_quantile(0.95, sum by (job, le) (rate(ktor_http_server_requests_seconds_bucket[5m]))) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High P95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} P95 latency is {{ $value }}s"

      - alert: JVMMemoryHigh
        expr: jvm_memory_used_bytes{area="heap"} / jvm_memory_max_bytes{area="heap"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage above 90% on {{ $labels.job }}"
          description: "{{ $labels.job }} heap usage is {{ $value | humanizePercentage }}"

  - name: kinetix-eod
    rules:
      - alert: NoOfficialEodPromoted
        expr: |
          (
            hour() >= 18
            and day_of_week() >= 1 and day_of_week() <= 5
            and absent(eod_promotion_last_timestamp)
          )
          or
          (
            hour() >= 18
            and day_of_week() >= 1 and day_of_week() <= 5
            and (time() - eod_promotion_last_timestamp) > 86400
          )
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "No Official EOD promoted today"
          description: "No Official EOD run has been promoted by 18:00 on a business day. Regulatory reporting may be affected."

      - alert: EodPromotionHighErrorRate
        expr: >
          sum(rate(eod_promotion_requests_total{result="error"}[5m]))
          /
          sum(rate(eod_promotion_requests_total[5m]))
          > 0.1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "EOD promotion endpoint error rate exceeds 10%"
          description: "EOD promotion error rate is {{ $value | humanizePercentage }} over the last 5 minutes"

      - alert: EodPromotionConflict
        expr: increase(eod_promotion_requests_total{result="error"}[5m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "EOD promotion attempt failed"
          description: "An EOD promotion request failed — possible conflict or validation error"

  - name: kinetix-replay
    rules:
      - alert: ReplayBlobMissDetected
        expr: increase(replay_blob_misses_total[1h]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Replay blob miss detected for {{ $labels.data_type }}/{{ $labels.source_service }}"
          description: "A market data blob referenced by a manifest could not be resolved during replay. Data type: {{ $labels.data_type }}, source: {{ $labels.source_service }}"

      - alert: ReplayDigestMismatch
        expr: increase(replay_digest_match_total{matched="false"}[1h]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Replay digest mismatch for portfolio {{ $labels.book_id }}"
          description: "A replay produced a different input digest than the original run for portfolio {{ $labels.book_id }}. Investigate model version or data changes."

      - alert: ManifestPartialRateElevated
        expr: >
          rate(manifest_captured_total{status="PARTIAL"}[1h])
          /
          rate(manifest_captured_total[1h])
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Manifest partial rate exceeds 5%"
          description: "More than 5% of captured manifests have PARTIAL status — market data availability has degraded"

      - alert: ReplaySlowP95
        expr: histogram_quantile(0.95, rate(replay_duration_seconds_bucket[5m])) > 120
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Replay P95 latency exceeds 120s"
          description: "P95 replay duration is {{ $value }}s"

  - name: kinetix-database
    rules:
      - alert: DBPoolExhausted
        expr: hikaricp_connections_pending > 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool exhausted on {{ $labels.pool }}"
          description: "{{ $labels.pool }} has {{ $value }} pending connection requests"

  - name: kinetix-grpc
    rules:
      - alert: GRPCHighLatency
        expr: histogram_quantile(0.95, rate(risk_var_calculation_duration_seconds_bucket[5m])) > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Risk engine gRPC P95 latency exceeds 60s"
          description: "VaR calculation P95 duration is {{ $value }}s"

  - name: kinetix-pnl-attribution
    rules:
      - alert: PnlUnexplainedFractionHigh
        expr: >
          abs(pnl_attribution_unexplained_pnl)
          /
          (abs(pnl_attribution_total_pnl) > 0 or vector(1))
          > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "P&L unexplained fraction >5% for {{ $labels.book_id }}"
          description: "Book {{ $labels.book_id }} has an unexplained P&L fraction of {{ $value | humanizePercentage }} for two consecutive calculations. Investigate stale Greeks or missing cross-Greek data."

  - name: kinetix-krd
    rules:
      - alert: KrdIntradayChangeHigh
        expr: >
          abs(
            krd_dv01_current{tenor=~".+"}
            - krd_dv01_sod{tenor=~".+"}
          )
          /
          (abs(krd_dv01_sod{tenor=~".+"}) > 0 or vector(1))
          > 0.20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "KRD change >20% for {{ $labels.book_id }} at {{ $labels.tenor }}"
          description: "DV01 for {{ $labels.book_id }} at tenor {{ $labels.tenor }} has changed by {{ $value | humanizePercentage }} intraday. May indicate large rate-sensitive trade or curve data issue."

  - name: kinetix-timescaledb
    rules:
      - alert: ContinuousAggregateJobFailed
        expr: increase(pg_stat_user_functions_calls{funcname=~".*policy_refresh_continuous_aggregate.*"}[1h]) == 0
        for: 2h
        labels:
          severity: warning
        annotations:
          summary: "TimescaleDB continuous aggregate refresh not running"
          description: "No continuous aggregate refresh has executed in the last 2 hours. Check TimescaleDB background worker health."

  - name: kinetix-vol-surface
    rules:
      - alert: VolSurfaceStale
        expr: vol_surface_staleness_seconds > 3600
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Vol surface stale for {{ $labels.instrument_id }}"
          description: "Vol surface for {{ $labels.instrument_id }} has not been updated for {{ $value }}s. This is distinct from price staleness — vol surfaces may update on a different cadence."
