services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    container_name: kinetix-postgres
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=4GB
      -c work_mem=24MB
      -c maintenance_work_mem=512MB
      -c effective_cache_size=16GB
      -c random_page_cost=1.1
      -c effective_io_concurrency=4
      -c wal_buffers=64MB
      -c checkpoint_completion_target=0.9
      -c max_wal_size=2GB
      -c shared_preload_libraries='timescaledb,pg_stat_statements'
      -c pg_stat_statements.track=all
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kinetix
      POSTGRES_PASSWORD: kinetix
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kinetix"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [kinetix]

  kafka:
    image: apache/kafka:3.9.0
    container_name: kinetix-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: kinetix-kafka-cluster-001
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks: [kinetix]

  redis:
    image: redis:7-alpine
    container_name: kinetix-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [kinetix]

volumes:
  pgdata:
  kafkadata:
  redisdata:

networks:
  kinetix:
    external: true
