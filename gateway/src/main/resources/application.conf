ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.kinetix.gateway.ApplicationKt.devModule ]
    }
}

jwt {
    issuer = "https://auth.kinetixrisk.ai/realms/kinetix"
    issuer = ${?JWT_ISSUER}
    audience = "kinetix-api"
    audience = ${?JWT_AUDIENCE}
    realm = "kinetix-gateway"
    realm = ${?JWT_REALM}
    jwksUrl = "http://localhost:8180/realms/kinetix/protocol/openid-connect/certs"
    jwksUrl = ${?JWT_JWKS_URL}
}

kafka {
    bootstrapServers = "localhost:9092"
    bootstrapServers = ${?KAFKA_BOOTSTRAP_SERVERS}
}

services {
    position {
        url = "http://localhost:8081"
        url = ${?POSITION_SERVICE_URL}
    }
    price {
        url = "http://localhost:8082"
        url = ${?PRICE_SERVICE_URL}
    }
    risk {
        url = "http://localhost:8083"
        url = ${?RISK_SERVICE_URL}
    }
    notification {
        url = "http://localhost:8086"
        url = ${?NOTIFICATION_SERVICE_URL}
    }
    rates {
        url = "http://localhost:8088"
        url = ${?RATES_SERVICE_URL}
    }
    referenceData {
        url = "http://localhost:8089"
        url = ${?REFERENCE_DATA_SERVICE_URL}
    }
    volatility {
        url = "http://localhost:8090"
        url = ${?VOLATILITY_SERVICE_URL}
    }
    correlation {
        url = "http://localhost:8091"
        url = ${?CORRELATION_SERVICE_URL}
    }
    regulatory {
        url = "http://localhost:8087"
        url = ${?REGULATORY_SERVICE_URL}
    }
    audit {
        url = "http://localhost:8084"
        url = ${?AUDIT_SERVICE_URL}
    }
}
