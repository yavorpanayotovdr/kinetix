apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "kinetix.fullname" . }}-db-init
  labels:
    {{- include "kinetix.labels" . | nindent 4 }}
data:
  01-create-databases.sql: |
    -- Per-service databases for Kinetix
    CREATE DATABASE kinetix_gateway;
    CREATE DATABASE kinetix_position;
    CREATE DATABASE kinetix_price;
    CREATE DATABASE kinetix_risk;
    CREATE DATABASE kinetix_audit;
    CREATE DATABASE kinetix_notification;
    CREATE DATABASE kinetix_regulatory;

    -- Enable TimescaleDB on price database (time-series hypertables)
    \c kinetix_price
    CREATE EXTENSION IF NOT EXISTS timescaledb;

    -- Enable TimescaleDB on audit database (hash-chained hypertable with 7yr retention)
    \c kinetix_audit
    CREATE EXTENSION IF NOT EXISTS timescaledb;

    -- Enable TimescaleDB on risk database (hourly VaR summary continuous aggregates)
    \c kinetix_risk
    CREATE EXTENSION IF NOT EXISTS timescaledb;

    -- Enable TimescaleDB on regulatory database (time-series submissions and backtests)
    \c kinetix_regulatory
    CREATE EXTENSION IF NOT EXISTS timescaledb;
  02-create-keycloak-db.sql: |
    CREATE DATABASE keycloak;
